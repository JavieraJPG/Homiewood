spring.application.name=peliculas

spring.datasource.url=jdbc:postgresql://localhost:5434/homiwood
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
# series y peliculas
tmdb.base-url=https://api.themoviedb.org/3
tmdb.image-base-url=https://image.tmdb.org/t/p/w500
tmdb.token=${TMDB_TOKEN}
# api anime
jikan.base-url=https://api.jikan.moe/v4

# ===============================
# CORS
# ===============================
#app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000 