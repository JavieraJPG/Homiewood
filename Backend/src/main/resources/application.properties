spring.application.name=peliculas

spring.datasource.url=jdbc:postgresql://localhost:5434/homiwood
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

tmdb.base-url=https://api.themoviedb.org/3
tmdb.image-base-url=https://image.tmdb.org/t/p/w500
tmdb.token=${TMDB_TOKEN}

jikan.base-url=https://api.jikan.moe/v4