<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/css/login.css">

    <title>HOMIEWOOD</title>
</head>

<body>

    <main>

        <div class="tarjeta">

            <h1>🎬 HOMIEWOOD</h1>
            <p id="subtitulo">Inicia sesión o crea una cuenta</p>

            <!-- FORMULARIO LOGIN -->
            <form id="login-form">

                <div class="campo">
                    <label for="username">Usuario:</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Tu username"
                        autocomplete="username"
                    >
                </div>

                <div class="campo">
                    <label for="password">Contraseña:</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Tu contraseña"
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit">Iniciar sesión</button>

                <button 
                    type="button" 
                    class="btn-secundario" 
                    onclick="mostrar('registro')"
                >
                    Crear cuenta
                </button>

                <a href="#" onclick="mostrar('recuperar')">
                    ¿Has olvidado tu contraseña?
                </a>

            </form>

            <!-- FORMULARIO REGISTRO -->
            <form id="form-registro" style="display:none">

                <div class="campo">
                    <label for="nombre">Nombre:</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        placeholder="Tu nombre"
                        autocomplete="name"
                    >
                </div>

                <div class="campo">
                    <label for="username2">Username:</label>
                    <input 
                        type="text" 
                        id="username2" 
                        placeholder="Tu nombre de usuario"
                        autocomplete="username"
                    >
                </div>

                <div class="campo">
                    <label for="email2">Email:</label>
                    <input 
                        type="email" 
                        id="email2" 
                        placeholder="usuario@email.com"
                        autocomplete="email"
                    >
                </div>

                <div class="campo">
                    <label for="password2">Contraseña:</label>
                    <input 
                        type="password" 
                        id="password2" 
                        placeholder="Tu contraseña"
                        autocomplete="new-password"
                    >
                </div>

                <div class="campo">
                    <label for="password3">Confirmar contraseña:</label>
                    <input 
                        type="password" 
                        id="password3" 
                        placeholder="Repite tu contraseña"
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit">Crear cuenta</button>

                <a href="#" onclick="mostrar('login')">
                    ¿Ya tienes cuenta? Inicia sesión
                </a>

            </form>

            <!-- FORMULARIO RECUPERAR CONTRASEÑA -->
            <form id="form-recuperar" style="display:none">

                <div class="campo">
                    <label for="email3">Email:</label>
                    <input 
                        type="email" 
                        id="email3" 
                        placeholder="correo@ejemplo.com"
                    >
                </div>

                <button type="submit">Enviar enlace</button>

                <a href="#" onclick="mostrar('login')">
                    Volver al inicio de sesión
                </a>

            </form>

            <!-- MENSAJES DE ERROR O ÉXITO -->
            <p id="mensaje"></p>

        </div>

    </main>

    <script>
        function mostrar(vista) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('form-registro').style.display = 'none';
            document.getElementById('form-recuperar').style.display = 'none';

            const mensaje = document.getElementById('mensaje');
            mensaje.textContent = '';

            if (vista === 'login') {
                document.getElementById('login-form').style.display = 'flex';
                document.getElementById('subtitulo').textContent = 'Inicia sesión o crea una cuenta';
            } else if (vista === 'registro') {
                document.getElementById('form-registro').style.display = 'flex';
                document.getElementById('subtitulo').textContent = 'Crea tu cuenta';
            } else if (vista === 'recuperar') {
                document.getElementById('form-recuperar').style.display = 'flex';
                document.getElementById('subtitulo').textContent = 'Recupera tu contraseña';
            }
        }
    </script>

    <script src="/src/JS/auth.js"></script>

</body>

</html>
