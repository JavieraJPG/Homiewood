<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <title>HOMIEWOOD</title>
</head>

<body>

    <main>


        <div class="tarjeta">

            <h1>🎬 HOMIEWOOD</h1>
            <p id="subtitulo">Inicia sesión o crea una cuenta</p>

            <form id="login-form">

                <div class="campo">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="usuario@email.com">
                </div>

                <div class="campo">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Tu contraseña">
                </div>
                <button type="submit">Iniciar sesión</button>
                <button type="button" class="btn-secundario" onclick="mostrar('registro')">Crear cuenta</button>
                <a href="#" onclick="mostrar('recuperar')">¿Has olvidado tu contraseña?</a>

            </form>
            <form id="form-registro" style="display:none">
                <div class="campo">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" placeholder="Tu nombre">
                </div>
                <div class="campo">
                    <label for="email2">Email:</label>
                    <input type="email" id="email2" placeholder="usuario@email.com">
                </div>
                <div class="campo">
                    <label for="password2">Contraseña:</label>
                    <input type="password" id="password2" placeholder="Tu contraseña">
                </div>
                <div class="campo">
                    <label for="password3">Confirmar contraseña:</label>
                    <input type="password" id="password3" placeholder="Repite tu contraseña">
                </div>
                <button type="submit">Crear cuenta</button>
                <a href="#" onclick="mostrar('login')">¿Ya tienes cuenta? Inicia sesión</a>
            </form>

            <form id="form-recuperar" style="display:none">
                <div class="campo">
                    <label for="email3">Email:</label>
                    <input type="email" id="email3" placeholder="correo@ejemplo.com">
                </div>
                <button type="submit">Enviar enlace</button>
                <a href="#" onclick="mostrar('login')">Volver al inicio de sesión</a>
            </form>

        </div>
    </main>
    <script>
        function mostrar(vista) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('form-registro').style.display = 'none';
            document.getElementById('form-recuperar').style.display = 'none';

            if (vista === 'login') {
                document.getElementById('login-form').style.display = 'flex';
                document.getElementById('subtitulo').textContent = 'Inicia sesión o crea una cuenta';
            } else if (vista === 'registro') {
                document.getElementById('form-registro').style.display = 'flex';
                document.getElementById('subtitulo').textContent = 'Crea tu cuenta';
            } else if (vista === 'recuperar') {
                document.getElementById('form-recuperar').style.display = 'flex';
                document.getElementById('subtitulo').textContent = 'Recupera tu contraseña';
            }
        }
    </script>
</body>

</html>
