<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMIEWOOD - Home</title>
  <link rel="stylesheet" href="/frontend/css/home.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
  <div class="wrapper">

    <!-- NAVBAR -->
    <div class="d-flex align-items-center gap-3 mb-4">
      <img src="/frontend/img/homelogo.webp" alt="Homiewood" width="260px">
      <div class="desktop-nav d-flex gap-4 flex-grow-1 justify-content-center">
        <a href="#" class="nav-link">Trending</a>
        <a href="#" class="nav-link">Mis Homies</a>
        <a href="#" class="nav-link">Lanzamientos</a>
      </div>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <button class="btn btn-link p-1 text-dark fs-5"><i class="bi bi-search"></i></button>
        <button class="btn btn-link p-1 text-dark fs-5"><i class="bi bi-bell-fill"></i></button>
        <span class= style="color:#2c1a36">Carlos696969</span>
        <div class="avatar">👤</div>
      </div>
      <button class="hamburger btn btn-link p-1 text-dark fs-4 d-none" id="menuBtn">☰</button>
    </div>

    <!-- Mobile drawer -->
    <div class="mobile-drawer" id="drawer">
      <a href="#">Trending</a>
      <a href="#">Mis Homies</a>
      <a href="#">Lanzamientos</a>
    </div>

    <!-- MAIN -->
    <div class="main-row d-flex gap-3 align-items-start">

      <!-- COLUMNA DEL FEED -->
      <div class="flex-grow-1" style="min-width:0">

        <!-- ===== CREAR POST ===== -->
        <div class="composer">

          <!-- Paso 1: Elige una pelicula o serie -->
          <p class="mb-2" style="color:#9b82ac; font-size:0.82rem; font-weight:700;">
            1. Elige una película o serie
          </p>
          <div class="film-search-wrap mb-3" id="filmSearchWrap">
            <input type="text" id="filmSearchInput" placeholder="🎬 Buscar película o serie..." autocomplete="off" />
            <div class="film-dropdown" id="filmDropdown"></div>
          </div>

          <!-- Tags de pelicula seleccionada (se muestran al postear) -->
          <div class="selected-film mb-3" id="selectedFilm">
            <div class="mini-cover" id="selectedCover"></div>
            <div class="flex-grow-1">
              <div id="selectedTitle" style="color:#fff; font-size:0.92rem;"></div>
              <div id="selectedMeta" style="color:#9b82ac; font-size:0.75rem;"></div>
              <div class="chip-tags" id="selectedTags"></div>
            </div>
            <button class="remove-film" id="removeFilm" title="Quitar">✕</button>
          </div>

          <!-- Paso 2: Escribe un post -->
          <p class="mb-2" style="color:#9b82ac; font-size:0.82rem; font-weight:700;">
            2. ¿Qué quieres compartir?
          </p>

          <textarea id="postText" placeholder="Cuéntale a tus homies..." class="mb-3"></textarea>

          <div class="d-flex justify-content-end">
            <button class="post-submit-btn" id="postBtn" disabled>Postear</button>
          </div>
        </div>

        <!-- ===== FEED (posts se renderizan aqui) ===== -->
        <div id="feed"></div>

      </div>

      <!-- BARRA LATERAL -->
      <div class="sidebar-col" style="width:290px; flex-shrink:0;">
        <div class="sidebar">

          <!-- RECOMENDACIONES -->
          <div class="sidebar-header">
            <span>Recomendaciones</span>
            <a href="#">Ver todas</a>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <div class="cover c1"><img src="https://m.media-amazon.com/images/M/MV5BM2JhNWVkOTctMWEwNy00NzUwLTkzZDYtYWE1NjVjNGEzNTljXkEyXkFqcGc@._V1_.jpg" alt="Stranger Things 5" width="140px"></div>
            </div>
            <div class="col-6">
              <div class="cover c2"><img src="https://m.media-amazon.com/images/M/MV5BYmQ4MTIwNzgtYzM4Zi00NWU4LWJmNjQtZGNhOTFiNDM2NmM2XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" alt="The Return of The Living Dead" width="140px"></div>
            </div>
            <div class="col-6">
              <div class="cover c3"><img src="https://m.media-amazon.com/images/M/MV5BMTc0MzgzNTI3N15BMl5BanBnXkFtZTcwNDk3MDIzMQ@@._V1_FMjpg_UX1000_.jpg" alt="Hard Candy" width="140px"></div>
            </div>
            <div class="col-6">
              <div class="cover c4"><img src="https://m.media-amazon.com/images/M/MV5BMjI5OTk3Mjg4MV5BMl5BanBnXkFtZTcwNzQ2NTQxNw@@._V1_FMjpg_UX1000_.jpg" alt="The Sleeping Beauty" width="140px"></div>
            </div>
          </div>

          <div class="sidebar-header">
            <span>Lanzamientos</span>
            <a href="#">Ver todas</a>
          </div>
          <div class="row g-2">
            <div class="col-4">
              <div class="cover c5"><img src="https://m.media-amazon.com/images/M/MV5BZmM3ZDU3ODItZmY5Yi00OTQ2LWE5OTctZTA5NDBhMWJkOGY3XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" alt="Devil Wears Prada 2" width="80px"></div>
            </div>
            <div class="col-4">
              <div class="cover c6"><img src="https://m.media-amazon.com/images/M/MV5BNzllNmRlN2EtMDQyOC00ODJjLTg4OWQtZDNmNGU3YzlkNjc1XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" alt="Michael" width="80px"></div>
            </div>
            <div class="col-4">
              <div class="cover c7"><img src="https://m.media-amazon.com/images/M/MV5BZTI1YTBiNmEtYWUxZi00YzFkLWIzNjMtMmZjMmY2NzM0ZWMzXkEyXkFqcGc@._V1_.jpg" alt="Toy Story 5" width="80px"></div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <div class="inner">
      <button class="bottom-nav-btn active">
        <span><img src="/frontend/img/trending.webp" alt="Trending" width="50px"></span>
        <span class="bottom-nav-label">Trending</span>
      </button>
      <button class="bottom-nav-btn">
        <span><img src="/frontend/img/myhomies.webp" alt="Mis Homies" width="70px"></span>
        <span class="bottom-nav-label">Mis Homies</span>
      </button>
      <button class="bottom-nav-btn">
        <span><img src="/frontend/img/clapperboard.webp" alt="Estrenos" width="40px"></span>
        <span class="bottom-nav-label">Estrenos</span>
      </button>
      <button class="bottom-nav-btn">
        <span><img src="/frontend/img/home_profileicon(noglow).webp" alt="Perfil" width="40px"></span>
        <span class="bottom-nav-label">Perfil</span>
      </button>
    </div>
  </nav>
  <script src="/frontend/src/JS/script.js"></script>
</body>
</html>
